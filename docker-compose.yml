services:
  mongo:
    image: mongo
    container_name: deeplocal-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: deeplocal-app-dev
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    volumes:
      - ./:/usr/src/app:cached
      - /usr/src/app/node_modules
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGODB: mongodb://mongo:27017/deeplocal
    command: npm run dev

volumes:
  mongo-data:
